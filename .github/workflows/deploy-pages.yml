name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-pages.yml'
  pull_request:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Configure build environment
        shell: bash
        run: |
          repo_name="${GITHUB_REPOSITORY#*/}"
          owner_name="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"

          if [ -n "${{ vars.VITE_BASE_PATH }}" ]; then
            echo "VITE_BASE_PATH=${{ vars.VITE_BASE_PATH }}" >> "$GITHUB_ENV"
          else
            echo "VITE_BASE_PATH=/$repo_name/" >> "$GITHUB_ENV"
          fi

          if [ -n "${{ vars.VITE_SITE_URL }}" ]; then
            echo "VITE_SITE_URL=${{ vars.VITE_SITE_URL }}" >> "$GITHUB_ENV"
          else
            echo "VITE_SITE_URL=https://${owner_name}.github.io/$repo_name" >> "$GITHUB_ENV"
          fi

          if [ -n "${{ vars.VITE_GA4_ID }}" ]; then
            echo "VITE_GA4_ID=${{ vars.VITE_GA4_ID }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ vars.VITE_WHATSAPP_NUMBER }}" ]; then
            echo "VITE_WHATSAPP_NUMBER=${{ vars.VITE_WHATSAPP_NUMBER }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ vars.VITE_CONTACT_EMAIL }}" ]; then
            echo "VITE_CONTACT_EMAIL=${{ vars.VITE_CONTACT_EMAIL }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ vars.VITE_BUSINESS_HOURS }}" ]; then
            echo "VITE_BUSINESS_HOURS=${{ vars.VITE_BUSINESS_HOURS }}" >> "$GITHUB_ENV"
          fi
          if [ -n "${{ vars.VITE_INSTAGRAM_HANDLE }}" ]; then
            echo "VITE_INSTAGRAM_HANDLE=${{ vars.VITE_INSTAGRAM_HANDLE }}" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        working-directory: site
        run: npm ci

      - name: Build and verify
        working-directory: site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
